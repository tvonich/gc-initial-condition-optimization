name: graphcast_ic
# Environment for GraphCast 1.0-degree IC optimization (gradient-based).
# Tested with CUDA 12.2 / cuDNN 8.9 on NVIDIA A100.
#
# For exact version pinning (full reproducibility), see envs/jax_cuda2_update.yaml.
#
# Install:
#   conda env create -f environment.yml
#   conda activate graphcast_ic
#
# NOTE: jaxlib must be installed from the JAX CUDA release index.
# The pip section below handles this automatically via --find-links.

channels:
  - nvidia/label/cuda-12.2.0
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - cudnn=8.9.2.26
  - numpy=1.26.4
  - xarray=2023.6.0
  - zarr=2.18.3
  - netcdf4=1.7.2
  - h5py=3.11.0
  - h5netcdf=1.3.0
  - pandas
  - dask
  - pip

  - pip:
    - --find-links https://storage.googleapis.com/jax-releases/jax_cuda_releases.html
    - jax==0.4.28
    - jaxlib==0.4.28+cuda12.cudnn89
    - dm-haiku
    - optax==0.2.3
    - chex==0.1.86
    - ml-dtypes==0.5.0
    - cloudpickle
    - fsspec
    - gsutil
